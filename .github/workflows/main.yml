name: Main

on:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          cache-key: cache-v4-
          node-version: 24
          pnpm-version: 10.25

      - run: pnpm check:types
      - run: pnpm lint
      - run: pnpm test
      - uses: codecov/codecov-action@v2.1.0
      - run: pnpm build

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          cache-key: cache-v4-
          node-version: 24
          pnpm-version: 10.25

      - run: pnpm docs
      - id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          channelId: live
          target: superdispatch-ui
          projectId: ${{ secrets.FIREBASE_PROJECT }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_HOSTING_SERVICE_ACCOUNT_JSON }}
          firebaseToolsVersion: '12.9.1'

  e2e:
    needs:
      - checks
      - docs
    runs-on: ubuntu-latest
    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          cache-key: cache-v4-
          node-version: 24
          pnpm-version: 10.25
      - run: pnpm cypress install
      - run: pnpm cypress run
        env:
          CYPRESS_HOST: https://ui.superdispatch.org

  visual-testing:
    needs:
      - checks
      - docs
    runs-on: ubuntu-latest
    steps:
      - uses: superdispatch/actions/prepare-node-repo@v2
        with:
          cache-key: cache-v4-
          node-version: 24
          pnpm-version: 10.25

      - run: pnpm test-visual-ci https://ui.superdispatch.org

      - if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-tests
          path: .loki
